version: "3.9"

services:
  netbox:
    image: netboxcommunity/netbox:latest
    depends_on:
      - postgres
      - redis
    env_file:
      - env/netbox.env
    expose:
      - "8080"
    ports:
      - "8000:8080"
    restart: always

  postgres:
    image: postgres:15-alpine
    env_file:
      - env/postgres.env
    volumes:
      - netbox_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:7-alpine
    restart: always

  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - netbox
    restart: always

volumes:
  netbox_data: